- type: entity
  id: BasePlasmaCartridge
  abstract: true
  parent: BaseItem
  components:
  - type: Item
    storedRotation: -90
  - type: Battery
    pricePerJoule: 0.15
  - type: PowerCell
  - type: Sprite
    sprite: Objects/Power/power_cells.rsi
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Extractable
    juiceSolution:
      reagents:
        - ReagentId: Zinc
          Quantity: 5
  - type: Tag
    tags:
      - PlasmaEnergy
  - type: Appearance
  - type: PowerCellVisuals
  - type: Riggable
  - type: GatheringLaser
  - type: HitscanBatteryAmmoProvider
    proto: PlasmaLaser
    fireCost: 20

- type: entity
  name: plasma energy cartridge
  description: A cartridge with a variable charge capacity, used as a consumable for a plasma cutter.
  id: PlasmaEnergyCatrtridge
  suffix: Full
  parent: BasePlasmaCartridge
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: small
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 200
    startingCharge: 200
  - type: Tag
    tags:
      - PlasmaEnergy

- type: entity
  name: plasma energy cartridge high capacity
  description: A cartridge with a high charge capacity, used as a consumable for a plasma cutter.
  id: PlasmaEnergyCatrtridgeHighCapacity
  suffix: Full
  parent: BasePlasmaCartridge
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: small
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 400
    startingCharge: 400
  - type: Tag
    tags:
      - PlasmaEnergy
